<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex,nofollow"/>
<title>Grana Pro · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#070707; --surface:#0f0f0f; --surface2:#181818; --surface3:#222;
  --border:rgba(255,255,255,0.06);
  --text1:#f5f0e1; --text2:rgba(245,240,225,0.65); --text3:rgba(245,240,225,0.4);
  --gold:#d4af37; --green:#22c55e; --red:#ef4444; --orange:#f97316; --blue:#3b82f6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text1);font-family:'Inter',sans-serif;min-height:100vh;}
.wrap{max-width:920px;margin:0 auto;padding:20px;}

#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:30px;max-width:340px;width:100%;text-align:center;}
.login-icon{font-size:48px;margin-bottom:12px;}
.login-titulo{font-size:18px;font-weight:800;color:var(--gold);margin-bottom:6px;}
.login-sub{font-size:12px;color:var(--text3);margin-bottom:20px;}
.login-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;color:var(--text1);font-family:inherit;font-size:14px;outline:none;text-align:center;letter-spacing:6px;margin-bottom:10px;}
.login-input:focus{border-color:var(--gold);}
.login-btn{width:100%;background:var(--gold);color:#0a0800;border:none;border-radius:12px;padding:14px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;}
.login-erro{color:var(--red);font-size:12px;margin-top:10px;display:none;}

#admin-screen{display:none;}
.head{display:flex;justify-content:space-between;align-items:center;padding:14px 0 22px;border-bottom:1px solid var(--border);margin-bottom:22px;}
.head-logo{font-size:18px;font-weight:800;color:var(--gold);}
.head-logo span{font-size:11px;color:var(--text3);font-weight:500;margin-left:6px;}
.btn-sair{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:8px 14px;border-radius:10px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;}
.stat-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:6px;}
.stat-val{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
.stat-val.green{color:var(--green);} .stat-val.red{color:var(--red);}
.stat-val.gold{color:var(--gold);} .stat-val.orange{color:var(--orange);}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px;}

.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.search{flex:1;min-width:220px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 14px;color:var(--text1);font-family:inherit;font-size:14px;outline:none;}
.search:focus{border-color:var(--gold);}
.filtro{display:flex;gap:4px;background:var(--surface);border-radius:12px;padding:4px;border:1px solid var(--border);}
.filtro-btn{background:transparent;border:none;color:var(--text2);padding:6px 12px;border-radius:8px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;}
.filtro-btn.active{background:var(--surface3);color:var(--text1);}

.tabela{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.row-head{display:grid;grid-template-columns:2fr 1.2fr 1fr 1.4fr 1.8fr;gap:8px;padding:12px 16px;background:var(--surface2);font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;font-weight:700;}
.row{display:grid;grid-template-columns:2fr 1.2fr 1fr 1.4fr 1.8fr;gap:8px;padding:14px 16px;border-top:1px solid var(--border);align-items:center;font-size:13px;}
.cliente-nome{font-weight:600;color:var(--text1);}
.cliente-zap{font-size:11px;color:var(--text3);margin-top:2px;}
.codigo{font-family:'Courier New',monospace;color:var(--gold);font-size:12px;font-weight:600;}
.modo-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;}
.modo-solo{background:rgba(212,175,55,0.15);color:var(--gold);}
.modo-grupo{background:rgba(59,130,246,0.15);color:var(--blue);}
.status{display:inline-flex;align-items:center;gap:6px;font-weight:600;font-size:12px;}
.dot{width:8px;height:8px;border-radius:50%;}
.dot-green{background:var(--green);} .dot-orange{background:var(--orange);}
.dot-red{background:var(--red);} .dot-blue{background:var(--blue);}
.acoes{display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap;}
.btn-acao{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);padding:6px 10px;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;}
.btn-acao:hover{background:var(--surface3);color:var(--text1);}
.btn-acao.green{color:var(--green);border-color:rgba(34,197,94,0.3);}
.btn-acao.red{color:var(--red);border-color:rgba(239,68,68,0.3);}
.btn-acao.zap{color:#25d366;border-color:rgba(37,211,102,0.3);}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px;}

@media(max-width:720px){
  .stats{grid-template-columns:1fr 1fr;}
  .row-head{display:none;}
  .row{grid-template-columns:1fr;gap:8px;padding:14px;}
  .acoes{justify-content:flex-start;}
}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--surface3);color:var(--text1);padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:9999;transition:transform 0.3s;border:1px solid var(--border);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.error{border-color:var(--red);color:var(--red);}
.toast.success{border-color:var(--green);color:var(--green);}

.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:9998;align-items:center;justify-content:center;padding:20px;}
.modal.show{display:flex;}
.modal-content{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;padding:24px;position:relative;}
.modal-close{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text2);font-size:24px;cursor:pointer;}
.modal-title{font-size:20px;font-weight:800;color:var(--gold);margin-bottom:20px;}
.info-group{margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.info-group:last-child{border-bottom:none;}
.info-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:6px;}
.info-valor{font-size:14px;color:var(--text1);font-weight:600;}
.info-valor.destaque{color:var(--gold);}
.info-valor.alerta{color:var(--orange);}
.modal-actions{display:flex;gap:10px;margin-top:24px;flex-wrap:wrap;}
.modal-actions button{flex:1;min-width:120px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-icon">👑</div>
    <div class="login-titulo">Painel Admin</div>
    <div class="login-sub">Grana Pro · acesso restrito</div>
    <input type="password" class="login-input" id="senha-input" placeholder="••••" autocomplete="off"/>
    <button class="login-btn" onclick="entrar()">Entrar</button>
    <div class="login-erro" id="login-erro">Senha incorreta</div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <div class="wrap">

    <div class="head">
      <div class="head-logo">👑 Grana Pro<span>· Painel Admin</span></div>
      <button class="btn-sair" onclick="sair()">Sair</button>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-label">Total</div><div class="stat-val" id="stat-total">0</div><div class="stat-sub" id="stat-total-sub">clientes</div></div>
      <div class="stat"><div class="stat-label">Ativos</div><div class="stat-val green" id="stat-ativos">0</div><div class="stat-sub" id="stat-ativos-sub">0% da base</div></div>
      <div class="stat"><div class="stat-label">Vencendo 7d</div><div class="stat-val orange" id="stat-vencendo">0</div><div class="stat-sub">cobrar pelo zap</div></div>
      <div class="stat"><div class="stat-label">Faturamento</div><div class="stat-val gold" id="stat-fat">R$ 0</div><div class="stat-sub" id="stat-fat-sub">mensal estimado</div></div>
    </div>

    <div class="toolbar">
      <input class="search" type="text" id="busca" placeholder="🔍 Buscar por nome ou código…" oninput="renderLista()"/>
      <div class="filtro">
        <button class="filtro-btn active" onclick="setFiltro('todos')" data-f="todos">Todos</button>
        <button class="filtro-btn" onclick="setFiltro('ativos')" data-f="ativos">Ativos</button>
        <button class="filtro-btn" onclick="setFiltro('trial')" data-f="trial">Trial</button>
        <button class="filtro-btn" onclick="setFiltro('vitalicio')" data-f="vitalicio">Vitalícios</button>
        <button class="filtro-btn" onclick="setFiltro('vencendo')" data-f="vencendo">Vencendo</button>
        <button class="filtro-btn" onclick="setFiltro('vencidos')" data-f="vencidos">Vencidos</button>
        <button class="filtro-btn" onclick="setFiltro('sem-plano')" data-f="sem-plano">Sem plano</button>
        <button class="filtro-btn" onclick="setFiltro('inativas')" data-f="inativas">Inativas</button>
      </div>
    </div>

    <!-- Bulk actions -->
    <div id="bulk-actions" style="margin-bottom:14px;display:none;gap:8px;flex-wrap:wrap"></div>

    <div class="tabela">
      <div class="row-head">
        <div>Cliente</div>
        <div>Código</div>
        <div>Modo</div>
        <div>Status / Validade</div>
        <div style="text-align:right">Ações</div>
      </div>
      <div id="lista-clientes"></div>
    </div>

  </div>
</div>

<!-- MODAL DE DETALHES -->
<div id="modal-detalhes" class="modal">
  <div class="modal-content">
    <button class="modal-close" onclick="fecharModal()">✕</button>
    <div class="modal-title" id="modal-titulo">Detalhes da Conta</div>

    <div id="modal-body"></div>

    <div class="modal-actions">
      <button class="btn-acao" style="padding:10px 14px;font-size:12px" onclick="fecharModal()">Fechar</button>
      <button class="btn-acao red" id="btn-deletar-modal" style="padding:10px 14px;font-size:12px" onclick="deletarContaDoModal()">🗑️ Deletar Conta</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, update, remove } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyCfB9cUJ5uQSrYsrglJ4yC-QtorFKCj4UI",
  authDomain: "financa-casal-f8458.firebaseapp.com",
  databaseURL: "https://financa-casal-f8458-default-rtdb.firebaseio.com",
  projectId: "financa-casal-f8458",
  storageBucket: "financa-casal-f8458.firebasestorage.app",
  messagingSenderId: "1011837439157",
  appId: "1:1011837439157:web:46f6f38c3eac3c4bacc2fc"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ════════════════════════════════════════════════════════════════════
//  ⚠️  CONFIGURAÇÕES — TROQUE A SENHA ABAIXO POR UMA SUA  ⚠️
// ════════════════════════════════════════════════════════════════════
const SENHA_ADMIN  = 'walison2026'; // ← TROQUE ESTA SENHA
const PRECO_MENSAL = 9.90;
const WHATSAPP_NUMERO = '5585991053816';

let _grupos = {};
let _filtro = 'todos';
let _codigoAtualModal = null;

// ── LOGIN ──────────────────────────────────────────────────────────
window.entrar = function(){
  const s = document.getElementById('senha-input').value;
  if(s === SENHA_ADMIN){
    localStorage.setItem('grana_admin', '1');
    mostrarAdmin();
  } else {
    document.getElementById('login-erro').style.display = 'block';
  }
}
window.sair = function(){
  localStorage.removeItem('grana_admin');
  location.reload();
}
document.getElementById('senha-input').addEventListener('keydown', e=>{
  if(e.key==='Enter') entrar();
});

if(localStorage.getItem('grana_admin') === '1'){
  mostrarAdmin();
}

// Fechar modal ao clicar fora
document.getElementById('modal-detalhes')?.addEventListener('click', (e)=>{
  if(e.target.id === 'modal-detalhes') fecharModal();
});

function mostrarAdmin(){
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-screen').style.display = 'block';
  carregarGrupos();
}

// ── DADOS ──────────────────────────────────────────────────────────
function carregarGrupos(){
  onValue(ref(db, 'grupos'), snap=>{
    _grupos = snap.val() || {};
    renderLista();
    renderStats();
  });
}

function statusDoGrupo(g){
  const v = g?.info?.validoAte || 0;
  const p = g?.info?.plano;
  const agora = Date.now();
  const dias = Math.ceil((v - agora) / 86400000);

  if(p === 'vitalicio') return { tipo:'vitalicio', dias:9999, label:'Vitalício 👑' };
  if(!p && v === 0)     return { tipo:'sem-plano', dias:0, label:'sem plano definido' };
  if(v <= agora)        return { tipo:'vencido', dias:Math.abs(dias), label:`vencido há ${Math.abs(dias)} dia${Math.abs(dias)===1?'':'s'}` };
  if(p === 'trial')     return { tipo:'trial', dias, label:`trial · ${dias}d` };
  if(dias <= 7)         return { tipo:'vencendo', dias, label:`vence em ${dias}d` };
  return { tipo:'ativo', dias, label:`ativo · ${dias}d restantes` };
}

function nomeDoGrupo(g){
  const m = g?.membros || {};
  const p1 = m.p1 || Object.values(m)[0];
  if(g?.info?.modo === 'grupo'){
    const nomes = Object.values(m).map(x=>x?.nome).filter(Boolean);
    if(nomes.length > 1) return nomes.slice(0,2).join(' & ');
    return (p1?.nome || 'Sem nome') + ' (Grupo)';
  }
  return p1?.nome || 'Sem nome';
}

function fmtData(ts){
  if(!ts) return '—';
  const d = new Date(ts);
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
}

// ── RENDER ─────────────────────────────────────────────────────────
window.setFiltro = function(f){
  _filtro = f;
  document.querySelectorAll('.filtro-btn').forEach(b=>b.classList.toggle('active', b.dataset.f===f));
  renderLista();
}

function isContaInativa(g){
  // Conta inativa = sem membros OU (não teve atividade nos últimos 7 dias)
  // IMPORTANTE: Só marca como inativa se tiver ultimaAtividade registrado
  // (contas antigas não têm esse campo, então não serão marcadas como inativas)
  const membros = Object.keys(g?.membros || {}).length;
  const ultimaAtividade = g?.ultimaAtividade;
  const agora = Date.now();

  // Se não tem registro de última atividade, NÃO marca como inativa
  if(!ultimaAtividade) return false;

  const diasInativo = (agora - ultimaAtividade) / 86400000;

  // Inativa apenas se: sem membros OU (7+ dias sem atividade)
  return membros === 0 || diasInativo > 7;
}

window.renderLista = function(){
  const busca = document.getElementById('busca').value.toLowerCase().trim();
  const lista = document.getElementById('lista-clientes');
  const itens = Object.entries(_grupos).map(([codigo, g])=>{
    const st = statusDoGrupo(g);
    const nome = nomeDoGrupo(g);
    const inativa = isContaInativa(g);
    return { codigo, g, st, nome, inativa };
  });

  const filtrados = itens.filter(it=>{
    if(_filtro === 'ativos'    && it.st.tipo !== 'ativo') return false;
    if(_filtro === 'trial'     && it.st.tipo !== 'trial') return false;
    if(_filtro === 'vitalicio' && it.st.tipo !== 'vitalicio') return false;
    if(_filtro === 'vencendo'  && it.st.tipo !== 'vencendo') return false;
    if(_filtro === 'vencidos'  && it.st.tipo !== 'vencido') return false;
    if(_filtro === 'sem-plano' && it.st.tipo !== 'sem-plano') return false;
    if(_filtro === 'inativas'  && !it.inativa) return false;
    if(busca){
      const txt = (it.nome+' '+it.codigo).toLowerCase();
      if(!txt.includes(busca)) return false;
    }
    return true;
  });

  if(filtrados.length === 0){
    lista.innerHTML = '<div class="empty">Nenhum cliente encontrado</div>';
    return;
  }

  lista.innerHTML = filtrados.map(it=>{
    const dot = {ativo:'green', trial:'blue', vitalicio:'green', vencendo:'orange', vencido:'red', 'sem-plano':'orange'}[it.st.tipo] || 'orange';
    const corStatus = {ativo:'var(--green)', trial:'var(--blue)', vitalicio:'var(--gold)', vencendo:'var(--orange)', vencido:'var(--red)', 'sem-plano':'var(--orange)'}[it.st.tipo] || 'var(--text2)';
    const valido = it.st.tipo === 'sem-plano' ? '—' : (it.st.tipo === 'vitalicio' ? '∞' : fmtData(it.g?.info?.validoAte || 0));
    const zap = encodeURIComponent(`Olá ${it.nome}! Sobre seu Grana Pro (${it.codigo})...`);
    const botoesExtras = it.inativa ? `<button class="btn-acao red" onclick="deletarConta('${it.codigo}', '${it.nome}')">🗑️ Deletar</button>` : '';
    return `
      <div class="row">
        <div style="cursor:pointer" onclick="abrirDetalhes('${it.codigo}')">
          <div class="cliente-nome">${it.nome}</div>
          <div class="cliente-zap">${it.g?.info?.modo === 'grupo' ? '👫 Grupo' : '👤 Individual'}${it.inativa ? ' · <span style="color:var(--orange)">⚠️ Inativa</span>' : ''}</div>
        </div>
        <div class="codigo">${it.codigo}</div>
        <div><span class="modo-badge ${it.g?.info?.modo === 'grupo' ? 'modo-grupo' : 'modo-solo'}">${it.g?.info?.modo === 'grupo' ? 'Grupo' : 'Solo'}</span></div>
        <div>
          <div class="status" style="color:${corStatus}"><span class="dot dot-${dot}"></span>${it.st.label}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">vence ${valido}</div>
        </div>
        <div class="acoes">
          <button class="btn-acao green" onclick="renovar('${it.codigo}', 30)">+30d</button>
          <button class="btn-acao green" onclick="renovar('${it.codigo}', 90)">+90d</button>
          <button class="btn-acao" style="color:var(--gold);border-color:rgba(212,175,55,0.3)" onclick="darVitalicio('${it.codigo}')">👑 Vitalício</button>
          <a class="btn-acao zap" href="https://wa.me/${WHATSAPP_NUMERO}?text=${zap}" target="_blank">💬</a>
          <button class="btn-acao red" onclick="bloquear('${it.codigo}')">🚫</button>
          <button class="btn-acao" style="color:var(--text2)" onclick="abrirDetalhes('${it.codigo}')">ℹ️ Detalhes</button>
          ${botoesExtras}
        </div>
      </div>`;
  }).join('');

  // Mostra/esconde bulk actions
  const semPlano = itens.filter(it=>it.st.tipo === 'sem-plano').length;
  const inativas = itens.filter(it=>it.inativa).length;
  const bulkDiv = document.getElementById('bulk-actions');

  if(semPlano > 0 || inativas > 0){
    bulkDiv.style.display = 'block';
    let html = '';
    if(semPlano > 0){
      html += `<button class="btn-acao green" style="padding:10px 16px;font-size:12px" onclick="liberarTodosVitalicio()">
        🎁 Marcar ${semPlano} cliente${semPlano===1?'':'s'} sem plano como Vitalício${semPlano===1?'':'s'} (testers)
      </button>`;
    }
    if(inativas > 0){
      html += `<button class="btn-acao red" style="padding:10px 16px;font-size:12px" onclick="deletarTodasInativas()">
        🗑️ Deletar ${inativas} conta${inativas===1?'':'s'} inativa${inativas===1?'':'s'}
      </button>`;
    }
    bulkDiv.innerHTML = html;
  } else {
    bulkDiv.style.display = 'none';
  }
}

function renderStats(){
  const itens = Object.values(_grupos);
  const total = itens.length;
  let ativos=0, vencendo=0, trial=0, vitalicios=0;
  itens.forEach(g=>{
    const st = statusDoGrupo(g);
    if(st.tipo==='ativo') ativos++;
    if(st.tipo==='vencendo') vencendo++;
    if(st.tipo==='trial') trial++;
    if(st.tipo==='vitalicio') vitalicios++;
  });
  const pagantes = ativos + vencendo;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-total-sub').textContent = trial+' trial · '+vitalicios+' vitalícios';
  document.getElementById('stat-ativos').textContent = pagantes;
  document.getElementById('stat-ativos-sub').textContent = total>0 ? Math.round(pagantes/total*100)+'% pagantes' : '—';
  document.getElementById('stat-vencendo').textContent = vencendo;
  const fat = pagantes * PRECO_MENSAL;
  document.getElementById('stat-fat').textContent = 'R$ '+fat.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  document.getElementById('stat-fat-sub').textContent = pagantes+' × R$ '+PRECO_MENSAL.toFixed(2).replace('.',',');
}

// ── AÇÕES ──────────────────────────────────────────────────────────
window.renovar = async function(codigo, dias){
  const g = _grupos[codigo];
  if(!g){ toast('Cliente não encontrado','error'); return; }
  const atual = g?.info?.validoAte || 0;
  const base  = Math.max(atual, Date.now());
  const novo  = base + dias*86400000;
  await update(ref(db, `grupos/${codigo}/info`), { plano:'pro', validoAte:novo });
  toast('Renovado por +'+dias+' dias!','success');
}

window.bloquear = async function(codigo){
  if(!confirm('Bloquear acesso Pro deste cliente?\n\nEle continua usando o app no plano Free (com limite).')) return;
  await update(ref(db, `grupos/${codigo}/info`), { plano:'free', validoAte:0 });
  toast('Cliente movido para Free','success');
}

window.darVitalicio = async function(codigo){
  if(!confirm('Dar acesso VITALÍCIO (Pro grátis pra sempre) a este cliente?')) return;
  const futuroLonge = Date.now() + 99*365*86400000;
  await update(ref(db, `grupos/${codigo}/info`), { plano:'vitalicio', validoAte:futuroLonge });
  toast('Cliente agora é vitalício 👑','success');
}

window.liberarTodosVitalicio = async function(){
  const semPlano = Object.entries(_grupos).filter(([_,g])=>!g?.info?.plano && (g?.info?.validoAte||0)===0);
  if(semPlano.length === 0){ toast('Nenhum cliente sem plano','error'); return; }
  if(!confirm(`Marcar ${semPlano.length} cliente(s) sem plano como Vitalícios?\n\nEles ficarão com Pro de graça pra sempre (testers).`)) return;
  const futuroLonge = Date.now() + 99*365*86400000;
  for(const [codigo,_] of semPlano){
    await update(ref(db, `grupos/${codigo}/info`), { plano:'vitalicio', validoAte:futuroLonge });
  }
  toast(`${semPlano.length} cliente(s) liberado(s) como vitalícios 👑`,'success');
}

window.deletarConta = async function(codigo, nome){
  if(!confirm(`⚠️ DELETAR CONTA?\n\n"${nome}" (${codigo})\n\nEsta ação é IRREVERSÍVEL. Toda a conta, dados de transações e membros serão removidos.`)) return;
  if(!confirm(`Tem CERTEZA? Esta é sua última chance!\n\n${nome} será deletado(a) permanentemente.`)) return;

  try {
    await remove(ref(db, `grupos/${codigo}`));
    toast(`Conta "${nome}" deletada permanentemente 🗑️`,'success');
  } catch(err){
    toast('Erro ao deletar conta','error');
    console.error(err);
  }
}

window.deletarTodasInativas = async function(){
  const inativas = Object.entries(_grupos).filter(([_,g])=>isContaInativa(g));
  if(inativas.length === 0){ toast('Nenhuma conta inativa','error'); return; }
  if(!confirm(`⚠️ DELETAR ${inativas.length} CONTA(S) INATIVA(S)?\n\nEsta ação é IRREVERSÍVEL!\n\nContas a deletar:\n${inativas.map(([_,g])=>nomeDoGrupo(g)).join(', ')}`)) return;
  if(!confirm(`CONFIRMAÇÃO FINAL: Tem CERTEZA que quer deletar ${inativas.length} conta(s) inativa(s)?\n\nEsta é sua última chance!`)) return;

  let deletadas = 0;
  for(const [codigo,_] of inativas){
    try {
      await remove(ref(db, `grupos/${codigo}`));
      deletadas++;
    } catch(err){
      console.error('Erro ao deletar', codigo, err);
    }
  }
  toast(`${deletadas}/${inativas.length} conta(s) inativa(s) deletada(s) permanentemente 🗑️`,'success');
}

function toast(msg, tipo){
  const t = document.createElement('div');
  t.className = 'toast '+(tipo||'');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.classList.add('show'),10);
  setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(),300); }, 2400);
}

// ── MODAL DE DETALHES ──────────────────────────────────────────────
window.abrirDetalhes = function(codigo){
  const g = _grupos[codigo];
  if(!g){ toast('Conta não encontrada','error'); return; }

  _codigoAtualModal = codigo;
  const nome = nomeDoGrupo(g);
  const st = statusDoGrupo(g);
  const inativa = isContaInativa(g);
  const criadoEm = g?.criadoEm || Date.now();
  const agora = Date.now();
  const diasDesdeGracao = Math.floor((agora - criadoEm) / 86400000);
  const ultimaAtividade = g?.ultimaAtividade || criadoEm;
  const diasInativo = Math.floor((agora - ultimaAtividade) / 86400000);
  const membros = Object.values(g?.membros || {});
  const transacoes = Object.values(g?.transacoes || {});
  const totalGasto = Object.values(g?.transacoes || {}).reduce((sum, t)=>sum + (t?.valor || 0), 0);

  const dataGracao = new Date(criadoEm);
  const dataUltimaAtividade = new Date(ultimaAtividade);

  let html = `
    <div class="info-group">
      <div class="info-label">Nome da Conta</div>
      <div class="info-valor destaque">${nome}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:4px">Código: ${codigo}</div>
    </div>

    <div class="info-group">
      <div class="info-label">Status</div>
      <div class="info-valor">${st.label}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:4px">${g?.info?.modo === 'grupo' ? '👫 Conta em Grupo' : '👤 Conta Individual'}</div>
    </div>

    <div class="info-group">
      <div class="info-label">📅 Criada em</div>
      <div class="info-valor">${dataGracao.toLocaleDateString('pt-BR')} (${diasDesdeGracao} dia${diasDesdeGracao===1?'':'s'} atrás)</div>
    </div>

    <div class="info-group">
      <div class="info-label">⏱️ Última Atividade</div>
      <div class="info-valor ${diasInativo > 30 ? 'alerta' : ''}">${dataUltimaAtividade.toLocaleDateString('pt-BR')} (${diasInativo} dia${diasInativo===1?'':'s'} atrás)</div>
    </div>

    <div class="info-group">
      <div class="info-label">⚠️ Status de Inatividade</div>
      <div class="info-valor ${inativa ? 'alerta' : ''}">${inativa ? '🔴 INATIVA' : '🟢 Ativa'}</div>
      ${inativa ? `<div style="font-size:11px;color:var(--orange);margin-top:4px">Esta conta está marcada para exclusão</div>` : ''}
    </div>

    <div class="info-group">
      <div class="info-label">👥 Membros</div>
      <div class="info-valor">${membros.length} membro${membros.length===1?'':'s'}</div>
      ${membros.length > 0 ? `<div style="font-size:11px;color:var(--text3);margin-top:4px">${membros.map(m=>m?.nome || 'Sem nome').join(', ')}</div>` : ''}
    </div>

    <div class="info-group">
      <div class="info-label">💰 Dados Financeiros</div>
      <div class="info-valor">${transacoes.length} transação${transacoes.length===1?'':'es'}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:4px">Total movimentado: R$ ${totalGasto.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2})}</div>
    </div>

    ${inativa ? `
    <div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:12px;margin-top:16px">
      <div style="font-size:12px;color:var(--red);font-weight:600">⚠️ ATENÇÃO!</div>
      <div style="font-size:12px;color:var(--red);margin-top:6px">Esta conta está INATIVA e pode ser deletada. A exclusão é IRREVERSÍVEL!</div>
    </div>
    ` : ''}
  `;

  document.getElementById('modal-titulo').textContent = `${nome} (${codigo})`;
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('btn-deletar-modal').style.display = inativa ? 'block' : 'none';
  document.getElementById('modal-detalhes').classList.add('show');
}

window.fecharModal = function(){
  document.getElementById('modal-detalhes').classList.remove('show');
  _codigoAtualModal = null;
}

window.deletarContaDoModal = async function(){
  if(!_codigoAtualModal) return;
  const g = _grupos[_codigoAtualModal];
  const nome = nomeDoGrupo(g);
  fecharModal();
  await deletarConta(_codigoAtualModal, nome);
}
</script>
